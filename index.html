<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antas AI News</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #15181d;
      --border: #23262d;
      --text: #e6e8eb;
      --muted: #9aa0a6;
      --accent: #4ade80;
      --accent-soft: #14332a;
      --read-bg: #11141a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,17,21,0.85);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.2px;
    }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters button {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
    }
    .filters button.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #fff;
    }
    .counter {
      color: var(--muted);
      font-size: 12px;
    }
    main {
      padding: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1040px) {
      .grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      transition: transform .08s ease, background .12s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card.read {
      opacity: 0.55;
      background: var(--read-bg);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }
    .title a {
      color: var(--text);
      text-decoration: none;
    }
    .title a:hover { text-decoration: underline; }
    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      background: #1f2a25;
      color: #7fb285;
      border: 1px solid #2f4a35;
    }
    .badge.unread {
      background: #1b2230;
      color: #cfd8e3;
      border-color: #2a3344;
    }
    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: auto;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .meta time { font-size: 11px; color: var(--muted); }
    .toggle {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">📰 Antas AI News</div>
    <div class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="unread">Unread</button>
      <button data-filter="read">Read</button>
    </div>
    <div class="counter" id="counter">0 items</div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No items yet.</div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const counter = document.getElementById('counter');
    let currentFilter = 'all';
    const STORAGE_KEY = 'antas-news-read';

    function loadReadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function saveReadState(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        // ignore
      }
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleDateString('it-IT', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function load() {
      let items = [];
      try {
        const res = await fetch('items.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        items = await res.json();
      } catch (e) {
        console.error(e);
        empty.textContent = 'Impossibile caricare items.json';
        empty.style.display = 'block';
        grid.innerHTML = '';
        counter.textContent = '0 items';
        return;
      }

      const readState = loadReadState();
      const merged = items.map(it => ({ ...it, read: !!readState[it.id] }));

      const filtered = merged.filter(it => {
        if (currentFilter === 'read') return it.read;
        if (currentFilter === 'unread') return !it.read;
        return true;
      }).sort((a, b) => String(b.published_at || '').localeCompare(String(a.published_at || '')));

      counter.textContent = `${items.length} total · ${filtered.length} shown`;

      if (!filtered.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = filtered.map(it => `
        <article class="card ${it.read ? 'read' : ''}" data-id="${it.id}">
          <div class="card-header">
            <div class="title">
              <a href="${escapeHtml(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title)}</a>
            </div>
            <span class="badge ${it.read ? '' : 'unread'}">${it.read ? 'Read' : 'New'}</span>
          </div>
          <div class="desc">${escapeHtml(it.description || '')}</div>
          <div class="meta">
            <time>${formatDate(it.published_at)}</time>
            <button class="toggle" data-action="${it.read ? 'unread' : 'read'}" data-id="${it.id}">
              ${it.read ? 'Mark unread' : 'Mark read'}
            </button>
          </div>
        </article>
      `).join('');
    }

    function toggleReadState(id) {
      const state = loadReadState();
      const current = !!state[id];
      state[id] = !current;
      saveReadState(state);
      return state[id];
    }

    grid.addEventListener('click', async (e) => {
      const btn = e.target.closest('button.toggle');
      if (!btn) return;
      const id = btn.dataset.id;
      const nextRead = toggleReadState(id);
      btn.dataset.action = nextRead ? 'unread' : 'read';
      btn.textContent = nextRead ? 'Mark unread' : 'Mark read';
      load();
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        load();
      });
    });

    load();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 Antas AI Dev News</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d23;
    --card-hover: #22262e;
    --border: #2a2e37;
    --text: #e6e8eb;
    --muted: #9aa0a6;
    --accent: #4f8cff;
    --accent-soft: #2a4f7a;
    --read-bg: #141821;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15,17,21,0.85);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.2px;
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filters button {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
  }
  .filters button.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: #fff;
  }
  .counter {
    color: var(--muted);
    font-size: 12px;
  }
  main {
    padding: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 720px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1040px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    transition: transform .08s ease, background .12s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover { background: var(--card-hover); }
  .card.read { opacity: 0.55; background: var(--read-bg); }
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
  }
  .title a {
    color: var(--text);
    text-decoration: none;
  }
  .title a:hover { text-decoration: underline; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
    background: #2a2e37;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .badge.read { background: #1f2a25; color: #7fb285; border-color: #2f4a35; }
  .desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .meta time { font-size: 11px; color: var(--muted); }
  .toggle {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .toggle:hover { background: var(--accent-soft); color: #fff; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 10px;
  }
</style>
</head>
<body>
<header>
  <div class="brand">🤖 AI Dev News</div>
  <div class="filters">
    <button data-filter="all" class="active">All</button>
    <button data-filter="unread">Unread</button>
    <button data-filter="read">Read</button>
  </div>
  <div class="counter" id="counter">0 items</div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No items yet.</div>
</main>
<script>
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const counter = document.getElementById('counter');
  let currentFilter = 'all';

  async function load() {
    const res = await fetch('/api/items');
    const items = await res.json();
    render(items);
  }

  function render(items) {
    const filtered = items.filter(it => {
      if (currentFilter === 'read') return it.read;
      if (currentFilter === 'unread') return !it.read;
      return true;
    }).sort((a, b) => String(b.published_at || '').localeCompare(String(a.published_at || '')));
    counter.textContent = `${items.length} total · ${filtered.length} shown`;
    if (!filtered.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(it => `
      <article class="card ${it.read ? 'read' : ''}" data-id="${it.id}">
        <div class="card-header">
          <div class="title">
            <a href="${escapeHtml(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title)}</a>
          </div>
          <span class="badge ${it.read ? 'read' : ''}">${it.read ? 'Read' : 'New'}</span>
        </div>
        <div class="desc">${escapeHtml(it.description || '')}</div>
        <div class="meta">
          <time>${escapeHtml(it.published_at || '')}</time>
          <button class="toggle" data-action="${it.read ? 'unread' : 'read'}" data-id="${it.id}">
            ${it.read ? 'Mark unread' : 'Mark read'}
          </button>
        </div>
      </article>
    `).join('');
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('button.toggle');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    await fetch(`/api/items/${encodeURIComponent(id)}/${action}`, { method: 'POST' });
    load();
  });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      load();
    });
  });

  load();
</script>
</body>
</html>
